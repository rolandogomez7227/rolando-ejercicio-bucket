version: 0.2

phases:
  pre_build:
    commands:
      - echo "Construyendo imagen..."
      - docker build -t ejercicio3-app .
  build:
    commands:
      - echo "Ejecutando contenedor..."
      # Usamos el contenedor y lo dejamos correr
      - docker run --name mi_contenedor -e VERSION_ID=$VERSION_ID ejercicio3-app
  post_build:
    commands:
      - echo "Extrayendo archivos del contenedor..."
      # Copiamos los archivos generados desde el contenedor hacia CodeBuild
      - docker cp mi_contenedor:/app/backup.log .
      - docker cp mi_contenedor:/app/resultados.json .
      - echo "Subiendo a S3..."
      - aws s3 cp backup.log s3://rolando-ejercicio-bucket/logs/
      - aws s3 cp resultados.json s3://rolando-ejercicio-bucket/resultados/

artifacts:
  files:
    - backup.log
    - resultados.json